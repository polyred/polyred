name: polyred

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
        check-latest: true

    - name: Install GL dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xvfb xorg-dev

    - name: Build
      run: go build ./...

    - name: Vet
      run: go vet ./...

    - name: Test (Linux)
      if: runner.os == 'Linux'
      run: |
        Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        export DISPLAY=:99.0
        go test -timeout 30m ./...

    - name: Test (macOS/Windows)
      if: runner.os != 'Linux'
      run: go test -timeout 30m ./...
