name: gl-probe

# Proves the GitHub-hosted ubuntu runner can create a headless OpenGL ES 3.1
# context with compute-shader support via Mesa's software rasterizer (llvmpipe)
# and the surfaceless EGL platform, cgo-free (purego). If this is green, the
# cgo-free GL compute backend (item #2) is CI-verifiable, not hardware-gated.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gles-surfaceless:
    name: headless GLES 3.1 compute (Mesa llvmpipe)
    runs-on: ubuntu-latest
    env:
      EGL_PLATFORM: surfaceless
      LIBGL_ALWAYS_SOFTWARE: '1'
      GALLIUM_DRIVER: llvmpipe
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
        check-latest: true

    - name: Install Mesa (EGL + GLES runtime + llvmpipe + eglinfo)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libegl1 libgles2 libgbm1 libgl1-mesa-dri mesa-utils-extra

    - name: Diagnostics
      continue-on-error: true
      run: |
        echo "--- ldconfig: EGL / GLESv2 ---"
        ldconfig -p | grep -Ei 'libEGL|libGLESv2' || true
        echo "--- eglinfo (surfaceless, brief) ---"
        eglinfo -B 2>&1 | head -100 || true

    - name: GL backend conformance (cgo-free, through the Device API)
      env:
        CGO_ENABLED: '0'
      run: go test -v -run 'TestGLBackend|TestSurface|TestShadingParity|TestGLRenderDepthOcclusion|TestGLRenderMRT' ./gpu/

    - name: Renderer deferred pass on the GL backend (multi-backend render)
      env:
        CGO_ENABLED: '0'
      run: go test -v -run 'TestGLDeferredRender|TestGPUForwardRasterCoverage' ./render/

  x11-windowed-present:
    name: cgo-free X11 windowed present (Xvfb + Mesa llvmpipe)
    # Proves the purego X11 + EGL window-surface + GLES present path: a real
    # X11 window (under Xvfb) with an eglCreateWindowSurface bound to it, cleared
    # and read back. This is the runtime check of the X11 struct offsets and the
    # EGL config match that a cgo-free build alone cannot exercise.
    runs-on: ubuntu-latest
    env:
      LIBGL_ALWAYS_SOFTWARE: '1'
      GALLIUM_DRIVER: llvmpipe
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
        check-latest: true

    - name: Install Mesa (EGL + GLES + llvmpipe), X11 and Xvfb
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libegl1 libgles2 libgbm1 libgl1-mesa-dri \
          libx11-6 xvfb

    - name: X11 windowed present (cgo-free, real window surface)
      env:
        CGO_ENABLED: '0'
        # Turn the test's "no display / no EGL runtime" skips into hard failures:
        # this job guarantees that stack, so a skip here would hide a real break.
        POLYRED_REQUIRE_WINDOW: '1'
      run: |
        Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        export DISPLAY=:99.0
        go test -v -run 'TestX11WindowedPresent|TestScenePresentReadback' ./app/
